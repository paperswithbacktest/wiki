<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="white"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#202124" font-weight="bold">SVI / SABR vs Deep-Learning Volatility Surface</text>

  <!-- Headers -->
  <rect x="40" y="60" width="240" height="40" rx="6" fill="#f1f3f4" stroke="#5f6368" stroke-width="1"/>
  <text x="160" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#202124" font-weight="bold">Dimension</text>

  <rect x="285" y="60" width="240" height="40" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="405" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-weight="bold">SVI / SABR (parametric)</text>

  <rect x="530" y="60" width="230" height="40" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="645" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ea4335" font-weight="bold">Deep Learning Surface</text>

  <!-- Row helper -->
  <g font-family="Arial, sans-serif" font-size="12" fill="#202124">

    <!-- Row 1 -->
    <rect x="40" y="105" width="720" height="42" fill="white" stroke="#dadce0" stroke-width="0.5"/>
    <text x="50" y="131" font-weight="bold">Parameters</text>
    <text x="295" y="131" fill="#5f6368">5 / slice (SVI), 4 / smile (SABR)</text>
    <text x="540" y="131" fill="#5f6368">10³ – 10⁶ network weights</text>

    <!-- Row 2 -->
    <rect x="40" y="147" width="720" height="42" fill="#f8f9fa" stroke="#dadce0" stroke-width="0.5"/>
    <text x="50" y="173" font-weight="bold">Calibration speed</text>
    <text x="295" y="173" fill="#5f6368">seconds per maturity</text>
    <text x="540" y="173" fill="#34a853" font-weight="bold">~1 ms forward pass</text>

    <!-- Row 3 -->
    <rect x="40" y="189" width="720" height="42" fill="white" stroke="#dadce0" stroke-width="0.5"/>
    <text x="50" y="215" font-weight="bold">Cross-day reuse</text>
    <text x="295" y="215" fill="#5f6368">recalibrate every snapshot</text>
    <text x="540" y="215" fill="#5f6368">one network for many days</text>

    <!-- Row 4 -->
    <rect x="40" y="231" width="720" height="42" fill="#f8f9fa" stroke="#dadce0" stroke-width="0.5"/>
    <text x="50" y="257" font-weight="bold">Arbitrage handling</text>
    <text x="295" y="257" fill="#5f6368">constrained search</text>
    <text x="540" y="257" fill="#5f6368">soft penalty or architectural</text>

    <!-- Row 5 -->
    <rect x="40" y="273" width="720" height="42" fill="white" stroke="#dadce0" stroke-width="0.5"/>
    <text x="50" y="299" font-weight="bold">Exotics revaluation</text>
    <text x="295" y="299" fill="#5f6368">closed form vanillas only</text>
    <text x="540" y="299" fill="#34a853" font-weight="bold">drop-in for any MC payoff</text>

    <!-- Row 6 -->
    <rect x="40" y="315" width="720" height="42" fill="#f8f9fa" stroke="#dadce0" stroke-width="0.5"/>
    <text x="50" y="341" font-weight="bold">Interpretability</text>
    <text x="295" y="341" fill="#34a853" font-weight="bold">each parameter has meaning</text>
    <text x="540" y="341" fill="#ea4335">black-box, needs diagnostics</text>

    <!-- Row 7 -->
    <rect x="40" y="357" width="720" height="42" fill="white" stroke="#dadce0" stroke-width="0.5"/>
    <text x="50" y="383" font-weight="bold">Far-OTM extrapolation</text>
    <text x="295" y="383" fill="#34a853" font-weight="bold">stable by construction</text>
    <text x="540" y="383" fill="#ea4335">can hallucinate without reg.</text>

  </g>

  <!-- Bottom note -->
  <rect x="40" y="410" width="720" height="38" rx="6" fill="#fef7e0" stroke="#fbbc04" stroke-width="1"/>
  <text x="400" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#202124" font-style="italic">Deep learning replaces the slow calibration step; same Black–Scholes layer on top.</text>
</svg>
