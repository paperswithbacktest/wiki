<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="white"/>
  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a73e8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#202124" font-weight="bold">Neural Network Pipeline for the Implied Volatility Surface</text>

  <!-- Stage 1: Input encoding -->
  <rect x="30" y="80" width="200" height="170" rx="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="130" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">1. INPUT ENCODING</text>
  <text x="130" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">log-moneyness k = log(K/F)</text>
  <text x="130" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">time-to-maturity T</text>
  <text x="130" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">spot, rates, dividends</text>
  <text x="130" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">VIX, time-of-day</text>
  <text x="130" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a73e8" font-style="italic">~5–20 features</text>

  <line x1="230" y1="165" x2="270" y2="165" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Stage 2: Neural mapping -->
  <rect x="275" y="80" width="240" height="170" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="395" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ea4335" font-weight="bold">2. NEURAL MAPPING</text>

  <!-- Tiny MLP cartoon -->
  <g fill="#ea4335" opacity="0.85">
    <circle cx="305" cy="140" r="5"/>
    <circle cx="305" cy="165" r="5"/>
    <circle cx="305" cy="190" r="5"/>
    <circle cx="305" cy="215" r="5"/>

    <circle cx="355" cy="135" r="5"/>
    <circle cx="355" cy="160" r="5"/>
    <circle cx="355" cy="185" r="5"/>
    <circle cx="355" cy="210" r="5"/>
    <circle cx="355" cy="235" r="5"/>

    <circle cx="405" cy="135" r="5"/>
    <circle cx="405" cy="160" r="5"/>
    <circle cx="405" cy="185" r="5"/>
    <circle cx="405" cy="210" r="5"/>
    <circle cx="405" cy="235" r="5"/>

    <circle cx="455" cy="160" r="5"/>
    <circle cx="455" cy="185" r="5"/>
    <circle cx="455" cy="210" r="5"/>

    <circle cx="500" cy="185" r="6"/>
  </g>
  <g stroke="#ea4335" stroke-width="0.5" opacity="0.35" fill="none">
    <line x1="305" y1="140" x2="355" y2="135"/>
    <line x1="305" y1="140" x2="355" y2="185"/>
    <line x1="305" y1="190" x2="355" y2="210"/>
    <line x1="355" y1="160" x2="405" y2="185"/>
    <line x1="355" y1="210" x2="405" y2="160"/>
    <line x1="405" y1="160" x2="455" y2="160"/>
    <line x1="405" y1="210" x2="455" y2="210"/>
    <line x1="455" y1="185" x2="500" y2="185"/>
  </g>

  <text x="395" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea4335" font-style="italic">MLP, 3–6 layers, Softplus activations</text>
  <text x="395" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">σ_imp = f(k, T, features)</text>

  <line x1="515" y1="165" x2="555" y2="165" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Stage 3: Constraint enforcement -->
  <rect x="560" y="80" width="210" height="170" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="665" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34a853" font-weight="bold">3. NO-ARBITRAGE</text>
  <text x="665" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">∂C/∂T ≥ 0   (calendar)</text>
  <text x="665" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">∂²C/∂K² ≥ 0  (butterfly)</text>
  <text x="665" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Soft penalty λ₁, λ₂</text>
  <text x="665" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">or architectural</text>
  <text x="665" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34a853" font-style="italic">arbitrage-free surface</text>

  <!-- Training loop -->
  <path d="M 665 250 L 665 320 L 130 320 L 130 250" fill="none" stroke="#1a73e8" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowB)"/>
  <text x="400" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-style="italic">Training: minimise weighted RMSE between predicted and listed IVs + arbitrage penalty</text>

  <!-- Output annotation -->
  <rect x="280" y="365" width="240" height="40" rx="6" fill="#fef7e0" stroke="#fbbc04" stroke-width="1"/>
  <text x="400" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#202124" font-weight="bold">1–3 ms forward pass → dense σ(k,T)</text>
</svg>
