<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="white"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#202124" font-weight="bold">Classical Approach vs Foundation Model Approach</text>

  <!-- Classical top row -->
  <text x="400" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5f6368" font-weight="bold">Classical: Train a new model per dataset</text>

  <rect x="30" y="80" width="130" height="55" rx="7" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="95" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea4335" font-weight="bold">Dataset A</text>
  <text x="95" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">(Stock prices)</text>
  <line x1="160" y1="107" x2="195" y2="107" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="200" y="80" width="130" height="55" rx="7" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="265" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea4335" font-weight="bold">Train ARIMA</text>
  <text x="265" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">(from scratch)</text>
  <line x1="330" y1="107" x2="365" y2="107" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="370" y="80" width="130" height="55" rx="7" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="435" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea4335" font-weight="bold">Model A</text>
  <text x="435" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">(stocks only)</text>

  <rect x="30" y="145" width="130" height="55" rx="7" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="95" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea4335" font-weight="bold">Dataset B</text>
  <text x="95" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">(FX rates)</text>
  <line x1="160" y1="172" x2="195" y2="172" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="200" y="145" width="130" height="55" rx="7" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="265" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea4335" font-weight="bold">Train LSTM</text>
  <text x="265" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">(from scratch)</text>
  <line x1="330" y1="172" x2="365" y2="172" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="370" y="145" width="130" height="55" rx="7" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="435" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea4335" font-weight="bold">Model B</text>
  <text x="435" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">(FX only)</text>

  <text x="620" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335">N datasets →</text>
  <text x="620" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335">N models</text>
  <text x="620" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335">N training runs</text>

  <!-- Divider -->
  <line x1="30" y1="225" x2="770" y2="225" stroke="#dadce0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Foundation model bottom row -->
  <text x="400" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">Foundation Model: One pretrained model, many tasks</text>

  <rect x="30" y="275" width="160" height="150" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="110" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-weight="bold">Massive Pretraining</text>
  <text x="110" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">100B+ time points</text>
  <text x="110" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">Finance, energy, web,</text>
  <text x="110" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">weather, healthcare...</text>
  <text x="110" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a73e8" font-style="italic">Done once by vendor</text>

  <line x1="190" y1="350" x2="245" y2="350" stroke="#5f6368" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="250" y="285" width="170" height="130" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="335" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-weight="bold">Foundation Model</text>
  <text x="335" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">TimesFM / Chronos /</text>
  <text x="335" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">MOIRAI / Lag-Llama</text>
  <text x="335" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">200M–700M params</text>

  <!-- Arrows to multiple tasks -->
  <line x1="420" y1="315" x2="520" y2="300" stroke="#34a853" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="350" x2="520" y2="350" stroke="#34a853" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="385" x2="520" y2="400" stroke="#34a853" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="525" y="280" width="230" height="40" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="1.2"/>
  <text x="640" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34a853">Zero-shot: Stock price forecast</text>

  <rect x="525" y="330" width="230" height="40" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="1.2"/>
  <text x="640" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34a853">Fine-tuned: FX volatility</text>

  <rect x="525" y="380" width="230" height="40" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="1.2"/>
  <text x="640" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34a853">Few-shot: Yield curve</text>

  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-style="italic">One model → many forecasting tasks, with zero or minimal retraining</text>
</svg>