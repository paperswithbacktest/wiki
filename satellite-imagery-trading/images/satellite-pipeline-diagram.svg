<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>
  
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#202124" font-weight="bold">Satellite Data Pipeline: From Image to Trading Signal</text>
  
  <!-- Step 1: Satellite -->
  <rect x="30" y="70" width="130" height="70" rx="8" fill="#1a73e8" opacity="0.12" stroke="#1a73e8" stroke-width="2"/>
  <text x="95" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-weight="bold">Satellite</text>
  <text x="95" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Raw imagery</text>
  
  <line x1="160" y1="105" x2="195" y2="105" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Preprocessing -->
  <rect x="205" y="70" width="130" height="70" rx="8" fill="#34a853" opacity="0.12" stroke="#34a853" stroke-width="2"/>
  <text x="270" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#34a853" font-weight="bold">Preprocessing</text>
  <text x="270" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Cloud mask, georeference</text>
  
  <line x1="335" y1="105" x2="370" y2="105" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Feature Extraction -->
  <rect x="380" y="70" width="130" height="70" rx="8" fill="#fbbc04" opacity="0.15" stroke="#a87000" stroke-width="2"/>
  <text x="445" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#a87000" font-weight="bold">Feature Extraction</text>
  <text x="445" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">CV / spectral analysis</text>
  
  <line x1="510" y1="105" x2="545" y2="105" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 4: Signal -->
  <rect x="555" y="70" width="130" height="70" rx="8" fill="#ea4335" opacity="0.12" stroke="#ea4335" stroke-width="2"/>
  <text x="620" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ea4335" font-weight="bold">Trading Signal</text>
  <text x="620" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Z-score, rank, IC</text>
  
  <!-- Use cases below -->
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#202124" font-weight="bold">Core Use Cases</text>
  
  <rect x="40" y="210" width="160" height="80" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="120" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-weight="bold">Parking Lot Counts</text>
  <text x="120" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Retail earnings</text>
  <text x="120" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">prediction</text>
  
  <rect x="220" y="210" width="160" height="80" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="300" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34a853" font-weight="bold">Oil Tank Shadows</text>
  <text x="300" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Crude inventory</text>
  <text x="300" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">estimation</text>
  
  <rect x="400" y="210" width="160" height="80" rx="8" fill="#fef7e0" stroke="#a87000" stroke-width="1.5"/>
  <text x="480" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a87000" font-weight="bold">NDVI Crop Health</text>
  <text x="480" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Agricultural yield</text>
  <text x="480" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">forecasting</text>
  
  <rect x="580" y="210" width="160" height="80" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="660" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335" font-weight="bold">Vessel Tracking</text>
  <text x="660" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Trade flows &amp;</text>
  <text x="660" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">port congestion</text>
  
  <!-- Join index note -->
  <rect x="150" y="330" width="500" height="40" rx="6" fill="#f8f9fa" stroke="#dadce0" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-style="italic">Key insight: Latitude/Longitude = universal join index between physical world &amp; financial assets</text>
</svg>