<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <rect width="800" height="380" fill="white"/>

  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34a853"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a73e8"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea4335"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Arial" font-size="17" font-weight="bold" fill="#202124">Confidence-Weighted Bayesian Probability Aggregation</text>

  <!-- Persona estimates column (left) -->
  <text x="110" y="60" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ea4335">50 Persona Estimates</text>

  <!-- Individual persona boxes -->
  <rect x="40" y="70" width="140" height="32" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="110" y="90" text-anchor="middle" font-family="Arial" font-size="12" fill="#202124">Statistician: p̂ = 0.68, conf = 0.80</text>

  <rect x="40" y="108" width="140" height="32" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="110" y="128" text-anchor="middle" font-family="Arial" font-size="12" fill="#202124">Macro analyst: p̂ = 0.61, conf = 0.65</text>

  <rect x="40" y="146" width="140" height="32" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="110" y="166" text-anchor="middle" font-family="Arial" font-size="12" fill="#202124">Geopolitical: p̂ = 0.72, conf = 0.55</text>

  <rect x="40" y="184" width="140" height="32" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="110" y="204" text-anchor="middle" font-family="Arial" font-size="12" fill="#202124">Freq. trader: p̂ = 0.59, conf = 0.70</text>

  <!-- Dots for remaining personas -->
  <text x="110" y="235" text-anchor="middle" font-family="Arial" font-size="20" fill="#ea4335">⋮</text>

  <rect x="40" y="250" width="140" height="32" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="110" y="270" text-anchor="middle" font-family="Arial" font-size="12" fill="#202124">P50: p̂ = 0.64, conf = 0.75</text>

  <!-- Confidence-weighted mean box -->
  <rect x="40" y="300" width="140" height="40" rx="6" fill="#fff3e0" stroke="#fb8c00" stroke-width="2"/>
  <text x="110" y="318" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fb8c00">Swarm consensus</text>
  <text x="110" y="334" text-anchor="middle" font-family="Arial" font-size="12" fill="#202124">p̂_s = 0.645, w_s = 0.72</text>

  <!-- Arrow from persona estimates to swarm consensus -->
  <line x1="110" y1="282" x2="110" y2="296" stroke="#fb8c00" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- Market prior box (bottom left) -->
  <rect x="40" y="70" width="0" height="0"/>
  <!-- Actually place market prior on a separate side -->

  <!-- Bayesian combiner (center) -->
  <rect x="310" y="165" width="180" height="100" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="400" y="192" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#34a853">Bayesian Combiner</text>
  <text x="400" y="215" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">p̂_final = (w_s · p̂_s + w_m · p_m)</text>
  <text x="400" y="232" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">/ (w_s + w_m)</text>
  <text x="400" y="252" text-anchor="middle" font-family="Arial" font-size="11" fill="#34a853">p̂_final = 0.638</text>

  <!-- Market prior box -->
  <rect x="310" y="70" width="180" height="70" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="400" y="96" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a73e8">Market Prior</text>
  <text x="400" y="116" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368">p_m = 0.55 (market price)</text>
  <text x="400" y="132" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368">w_m = 0.28 (calibrated weight)</text>

  <!-- Arrow: Market prior → Combiner -->
  <line x1="400" y1="140" x2="400" y2="162" stroke="#1a73e8" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Arrow: Swarm consensus → Combiner -->
  <line x1="180" y1="320" x2="308" y2="215" stroke="#fb8c00" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Edge calculation box (right) -->
  <rect x="560" y="165" width="190" height="100" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="655" y="192" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1a73e8">Edge Calculation</text>
  <text x="655" y="215" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368">Edge = p̂_final − p_m</text>
  <text x="655" y="232" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368">= 0.638 − 0.55 = 0.088</text>
  <text x="655" y="255" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a73e8">8.8pp edge → BUY</text>

  <!-- Arrow: Combiner → Edge -->
  <line x1="490" y1="215" x2="558" y2="215" stroke="#34a853" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Disagreement note at bottom -->
  <rect x="310" y="300" width="440" height="50" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="530" y="320" text-anchor="middle" font-family="Arial" font-size="12" fill="#ea4335" font-weight="bold">High internal variance → weak edge signal</text>
  <text x="530" y="338" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">If std(p̂_i) &gt; threshold, reduce w_s or skip market</text>
</svg>
