<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <rect width="800" height="350" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">Walk-Forward Optimization</text>
  <text x="80" y="65" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Split 1:</text>
  <rect x="130" y="50" width="300" height="25" rx="3" fill="#1a73e8" opacity="0.2" stroke="#1a73e8" stroke-width="1"/>
  <text x="280" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8">Train</text>
  <rect x="430" y="50" width="100" height="25" rx="3" fill="#34a853" opacity="0.3" stroke="#34a853" stroke-width="1.5"/>
  <text x="480" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34a853" font-weight="bold">Test</text>
  <text x="80" y="105" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Split 2:</text>
  <rect x="180" y="90" width="300" height="25" rx="3" fill="#1a73e8" opacity="0.2" stroke="#1a73e8" stroke-width="1"/>
  <text x="330" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8">Train</text>
  <rect x="480" y="90" width="100" height="25" rx="3" fill="#34a853" opacity="0.3" stroke="#34a853" stroke-width="1.5"/>
  <text x="530" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34a853" font-weight="bold">Test</text>
  <text x="80" y="145" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Split 3:</text>
  <rect x="230" y="130" width="300" height="25" rx="3" fill="#1a73e8" opacity="0.2" stroke="#1a73e8" stroke-width="1"/>
  <text x="380" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8">Train</text>
  <rect x="530" y="130" width="100" height="25" rx="3" fill="#34a853" opacity="0.3" stroke="#34a853" stroke-width="1.5"/>
  <text x="580" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34a853" font-weight="bold">Test</text>
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Split 4:</text>
  <rect x="280" y="170" width="300" height="25" rx="3" fill="#1a73e8" opacity="0.2" stroke="#1a73e8" stroke-width="1"/>
  <text x="430" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8">Train</text>
  <rect x="580" y="170" width="100" height="25" rx="3" fill="#34a853" opacity="0.3" stroke="#34a853" stroke-width="1.5"/>
  <text x="630" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34a853" font-weight="bold">Test</text>
  <line x1="130" y1="220" x2="680" y2="220" stroke="#999" stroke-width="1"/>
  <text x="405" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">← Earlier                    Time                    Later →</text>
  <rect x="100" y="260" width="600" height="70" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333" font-weight="bold">Key: Train window slides forward; each test fold is always in the future</text>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Prevents look-ahead bias while adapting to changing market regimes</text>
</svg>