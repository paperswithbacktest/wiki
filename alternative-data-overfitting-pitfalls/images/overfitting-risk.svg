<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <rect width="800" height="280" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#202124" font-weight="bold">Overfitting Risk Increases with Number of Trials</text>
  <rect x="50" y="60" width="700" height="40" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="1"/>
  <text x="400" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ea4335">P[overfit] ≈ 1 - (1 - p)^N → testing 100 variants at p=0.05 gives 99.4% false discovery rate</text>
  <rect x="100" y="130" width="140" height="60" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="170" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34a853" font-weight="bold">N = 5 trials</text>
  <text x="170" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">P[overfit] = 23%</text>
  <rect x="330" y="130" width="140" height="60" rx="8" fill="#fef7e0" stroke="#a87000" stroke-width="2"/>
  <text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a87000" font-weight="bold">N = 20 trials</text>
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">P[overfit] = 64%</text>
  <rect x="560" y="130" width="140" height="60" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="630" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335" font-weight="bold">N = 100 trials</text>
  <text x="630" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">P[overfit] = 99.4%</text>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-weight="bold">Solution: Use Deflated Sharpe Ratio to account for multiple testing</text>
</svg>