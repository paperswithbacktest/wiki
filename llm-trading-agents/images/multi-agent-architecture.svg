<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="white"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#202124" font-weight="bold">Multi-Agent LLM Trading Architecture (Xiao et al., 2024)</text>

  <!-- Analyst Team -->
  <rect x="20" y="60" width="180" height="200" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-weight="bold">Analyst Team</text>

  <rect x="35" y="100" width="150" height="28" rx="5" fill="white" stroke="#1a73e8" stroke-width="1"/>
  <text x="110" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Fundamentals Analyst</text>

  <rect x="35" y="135" width="150" height="28" rx="5" fill="white" stroke="#1a73e8" stroke-width="1"/>
  <text x="110" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Sentiment Analyst</text>

  <rect x="35" y="170" width="150" height="28" rx="5" fill="white" stroke="#1a73e8" stroke-width="1"/>
  <text x="110" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">News Analyst</text>

  <rect x="35" y="205" width="150" height="28" rx="5" fill="white" stroke="#1a73e8" stroke-width="1"/>
  <text x="110" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Technical Analyst</text>

  <!-- Arrow to Research -->
  <line x1="200" y1="160" x2="235" y2="160" stroke="#5f6368" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Research Team -->
  <rect x="240" y="90" width="160" height="140" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="320" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ea4335" font-weight="bold">Research Team</text>

  <rect x="255" y="130" width="130" height="28" rx="5" fill="white" stroke="#ea4335" stroke-width="1"/>
  <text x="320" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Bull Researcher</text>

  <rect x="255" y="168" width="130" height="28" rx="5" fill="white" stroke="#ea4335" stroke-width="1"/>
  <text x="320" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Bear Researcher</text>

  <text x="320" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ea4335" font-style="italic">Structured debate</text>

  <!-- Arrow to Trader -->
  <line x1="400" y1="160" x2="435" y2="160" stroke="#5f6368" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Trader -->
  <rect x="440" y="110" width="140" height="100" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="510" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#34a853" font-weight="bold">Trader Agent</text>
  <text x="510" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Synthesises insights</text>
  <text x="510" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Proposes trade</text>

  <!-- Arrow to Risk -->
  <line x1="580" y1="160" x2="615" y2="160" stroke="#5f6368" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Risk Management -->
  <rect x="620" y="90" width="160" height="140" rx="8" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="700" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fb8c00" font-weight="bold">Risk Management</text>
  <text x="700" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Evaluate exposure</text>
  <text x="700" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Check risk limits</text>
  <text x="700" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Approve / reject</text>
  <text x="700" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fb8c00" font-style="italic">→ Fund Manager</text>

  <!-- Data sources at bottom -->
  <rect x="60" y="310" width="680" height="70" rx="8" fill="#f8f9fa" stroke="#dadce0" stroke-width="1"/>
  <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#202124" font-weight="bold">Data Sources</text>
  <text x="150" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Price OHLCV</text>
  <text x="300" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">News articles</text>
  <text x="440" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Social sentiment</text>
  <text x="590" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Financial reports</text>

  <!-- Arrows from data to analysts -->
  <line x1="110" y1="310" x2="110" y2="265" stroke="#dadce0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Execution at bottom -->
  <rect x="270" y="410" width="260" height="45" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-weight="bold">Simulated Exchange → Order Executed</text>
  <line x1="700" y1="230" x2="700" y2="432" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="700" y1="432" x2="535" y2="432" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
</svg>