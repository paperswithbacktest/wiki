<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a73e8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#202124" font-weight="bold">LLM Trading Agent: Perception → Reasoning → Action Loop</text>

  <!-- PERCEPTION box -->
  <rect x="30" y="70" width="220" height="160" rx="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="140" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a73e8" font-weight="bold">PERCEPTION</text>
  <text x="140" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Market data (OHLCV)</text>
  <text x="140" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">News &amp; filings</text>
  <text x="140" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Social sentiment</text>
  <text x="140" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Technical indicators</text>
  <text x="140" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Portfolio state</text>

  <!-- Arrow: Perception → Reasoning -->
  <line x1="250" y1="150" x2="285" y2="150" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- REASONING box (LLM core) -->
  <rect x="290" y="70" width="220" height="160" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ea4335" font-weight="bold">REASONING (LLM)</text>
  <text x="400" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Summarise context</text>
  <text x="400" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Retrieve memory</text>
  <text x="400" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Chain-of-thought analysis</text>
  <text x="400" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Debate (bull vs bear)</text>
  <text x="400" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Risk assessment</text>

  <!-- Arrow: Reasoning → Action -->
  <line x1="510" y1="150" x2="545" y2="150" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ACTION box -->
  <rect x="550" y="70" width="220" height="160" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#34a853" font-weight="bold">ACTION</text>
  <text x="660" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">BUY / SELL / HOLD</text>
  <text x="660" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Position sizing</text>
  <text x="660" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Order execution</text>
  <text x="660" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Stop-loss / take-profit</text>
  <text x="660" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Rebalance portfolio</text>

  <!-- Feedback loop arrow (Action back to Perception) -->
  <path d="M 660 240 L 660 370 L 140 370 L 140 240" fill="none" stroke="#1a73e8" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-style="italic">Feedback loop: execution results update agent memory &amp; market state</text>

  <!-- Memory/Tools sidebar -->
  <rect x="320" y="270" width="160" height="60" rx="8" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fb8c00" font-weight="bold">Tools &amp; Memory</text>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">APIs, DB, strategy library</text>
  <line x1="400" y1="230" x2="400" y2="265" stroke="#fb8c00" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
</svg>