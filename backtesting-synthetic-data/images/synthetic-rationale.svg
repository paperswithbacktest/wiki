<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <rect width="800" height="250" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">Why Test on Synthetic Data?</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/></marker></defs>
  <rect x="40" y="60" width="180" height="60" rx="8" fill="#ea4335" opacity="0.1" stroke="#ea4335" stroke-width="1.5"/>
  <text x="130" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335" font-weight="bold">1 Historical Path</text>
  <text x="130" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">N=1, overfittable</text>
  <line x1="220" y1="90" x2="280" y2="90" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="290" y="60" width="200" height="60" rx="8" fill="#1a73e8" opacity="0.1" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="390" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-weight="bold">Monte Carlo / Bootstrap</text>
  <text x="390" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Generate 1000+ paths</text>
  <line x1="490" y1="90" x2="550" y2="90" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="560" y="60" width="200" height="60" rx="8" fill="#34a853" opacity="0.1" stroke="#34a853" stroke-width="1.5"/>
  <text x="660" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34a853" font-weight="bold">Distribution of Results</text>
  <text x="660" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Confidence intervals</text>
  <text x="400" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333">Test whether strategy profits survive across many possible market scenarios</text>
  <text x="400" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Robust strategy: works across most synthetic paths. Overfit strategy: only works on historical.</text>
</svg>