<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">Meta-Labeling Pipeline</text>
  <!-- Primary Model -->
  <rect x="30" y="70" width="180" height="90" rx="10" fill="#1a73e8" opacity="0.12" stroke="#1a73e8" stroke-width="2"/>
  <text x="120" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">Primary Model</text>
  <text x="120" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">(Predicts side:</text>
  <text x="120" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">long or short)</text>
  <!-- Arrow 1 -->
  <line x1="210" y1="115" x2="280" y2="115" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">Side signal</text>
  <!-- Triple Barrier -->
  <rect x="290" y="70" width="180" height="90" rx="10" fill="#fbbc04" opacity="0.15" stroke="#fbbc04" stroke-width="2"/>
  <text x="380" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#b8860b" font-weight="bold">Triple-Barrier</text>
  <text x="380" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Labels outcomes</text>
  <text x="380" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">as +1, -1, or 0</text>
  <!-- Arrow 2 -->
  <line x1="380" y1="160" x2="380" y2="210" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="190" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">Meta-labels</text>
  <!-- Meta-label creation box -->
  <rect x="290" y="220" width="180" height="70" rx="10" fill="#34a853" opacity="0.12" stroke="#34a853" stroke-width="2"/>
  <text x="380" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34a853" font-weight="bold">Meta-Label = 1</text>
  <text x="380" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">if primary was correct</text>
  <!-- Arrow 3 -->
  <line x1="470" y1="255" x2="540" y2="255" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Secondary Model -->
  <rect x="550" y="70" width="210" height="90" rx="10" fill="#ea4335" opacity="0.12" stroke="#ea4335" stroke-width="2"/>
  <text x="655" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ea4335" font-weight="bold">Secondary Model</text>
  <text x="655" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">(Predicts size:</text>
  <text x="655" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">bet or skip)</text>
  <!-- Arrow from features to secondary -->
  <line x1="210" y1="145" x2="240" y2="180" stroke="#5f6368" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="240" y1="180" x2="540" y2="180" stroke="#5f6368" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="540" y1="180" x2="590" y2="160" stroke="#5f6368" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">Features + primary prediction</text>
  <!-- Final output -->
  <rect x="550" y="220" width="210" height="70" rx="10" fill="#9c27b0" opacity="0.1" stroke="#9c27b0" stroke-width="2"/>
  <text x="655" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#9c27b0" font-weight="bold">Final Decision</text>
  <text x="655" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Side × Size = Position</text>
  <line x1="655" y1="160" x2="655" y2="210" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Bottom explanation -->
  <rect x="60" y="320" width="680" height="80" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a1a1a" font-weight="bold">Key Insight: Separate "Side" from "Size"</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">The primary model decides direction (long/short). The secondary model decides</text>
  <text x="400" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">whether to act on that signal and how much to bet, using the meta-label as its target.</text>
</svg>