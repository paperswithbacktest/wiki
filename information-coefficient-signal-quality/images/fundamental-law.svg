<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <rect width="800" height="250" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#202124" font-weight="bold">Fundamental Law of Active Management</text>
  <rect x="100" y="60" width="150" height="70" rx="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="175" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1a73e8" font-weight="bold">IC</text>
  <text x="175" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Signal Quality</text>
  <text x="310" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#5f6368">×</text>
  <rect x="350" y="60" width="150" height="70" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="425" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#34a853" font-weight="bold">√BR</text>
  <text x="425" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Breadth (# bets)</text>
  <text x="560" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#5f6368">≈</text>
  <rect x="600" y="60" width="150" height="70" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="675" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ea4335" font-weight="bold">IR</text>
  <text x="675" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Information Ratio</text>
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-style="italic">Even a small IC (0.03-0.05) yields strong IR when applied across many stocks frequently</text>
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Example: IC=0.05, 500 stocks, monthly = IR ≈ 3.87</text>
</svg>