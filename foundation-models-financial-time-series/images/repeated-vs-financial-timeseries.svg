<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <rect width="800" height="380" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" fill="#1a1a1a" font-weight="bold">Repeated-Experiment vs Financial Time Series</text>

  <!-- Left: Repeated Experiment -->
  <rect x="40" y="55" width="340" height="295" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="210" y="82" text-anchor="middle" font-family="Arial" font-size="15" fill="#34a853" font-weight="bold">Repeated-Experiment Series</text>
  <text x="210" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368">(where foundation models excel)</text>

  <text x="60" y="130" font-family="Arial" font-size="12" fill="#333">• ECG heartbeats — same pattern repeats</text>
  <text x="60" y="152" font-family="Arial" font-size="12" fill="#333">• Server CPU metrics — periodic cycles</text>
  <text x="60" y="174" font-family="Arial" font-size="12" fill="#333">• Weather sensors — seasonal structure</text>
  <text x="60" y="196" font-family="Arial" font-size="12" fill="#333">• Satellite observations — orbital repeats</text>

  <rect x="60" y="220" width="300" height="60" rx="6" fill="#34a853" opacity="0.1"/>
  <text x="210" y="242" text-anchor="middle" font-family="Arial" font-size="12" fill="#34a853" font-weight="bold">Properties:</text>
  <text x="210" y="262" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Stationary · Repeating patterns · Large training corpora</text>

  <rect x="60" y="295" width="300" height="40" rx="6" fill="#34a853" opacity="0.15"/>
  <text x="210" y="320" text-anchor="middle" font-family="Arial" font-size="12" fill="#34a853" font-weight="bold">Foundation model fit: EXCELLENT</text>

  <!-- Right: Financial -->
  <rect x="420" y="55" width="340" height="295" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="590" y="82" text-anchor="middle" font-family="Arial" font-size="15" fill="#ea4335" font-weight="bold">Financial Time Series</text>
  <text x="590" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368">(fundamental challenges remain)</text>

  <text x="440" y="130" font-family="Arial" font-size="12" fill="#333">• Stock prices — regime shifts</text>
  <text x="440" y="152" font-family="Arial" font-size="12" fill="#333">• Volatility — clustering, mean reverting</text>
  <text x="440" y="174" font-family="Arial" font-size="12" fill="#333">• Order flow — adversarial dynamics</text>
  <text x="440" y="196" font-family="Arial" font-size="12" fill="#333">• Macro indicators — structural breaks</text>

  <rect x="440" y="220" width="300" height="60" rx="6" fill="#ea4335" opacity="0.1"/>
  <text x="590" y="242" text-anchor="middle" font-family="Arial" font-size="12" fill="#ea4335" font-weight="bold">Properties:</text>
  <text x="590" y="262" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Non-stationary · Regime-changing · Adversarial · Sparse</text>

  <rect x="440" y="295" width="300" height="40" rx="6" fill="#ea4335" opacity="0.15"/>
  <text x="590" y="320" text-anchor="middle" font-family="Arial" font-size="12" fill="#ea4335" font-weight="bold">Foundation model fit: UNCERTAIN</text>
</svg>