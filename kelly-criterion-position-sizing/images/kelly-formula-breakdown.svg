<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="720" height="320" fill="white"/>
  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Kelly Criterion Formula Breakdown</text>

  <!-- Formula box -->
  <rect x="200" y="50" width="320" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="360" y="75" text-anchor="middle" font-size="13" fill="#1e3a8a">Kelly fraction  f* = (b·p − q) / b</text>
  <text x="360" y="98" text-anchor="middle" font-size="11" fill="#374151">where  q = 1 − p</text>

  <!-- Arrows down -->
  <line x1="250" y1="110" x2="150" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="110" x2="360" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="110" x2="570" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels -->
  <rect x="60" y="155" width="180" height="52" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="150" y="177" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">p</text>
  <text x="150" y="197" text-anchor="middle" font-size="11" fill="#374151">Win probability</text>

  <rect x="270" y="155" width="180" height="52" rx="6" fill="#fefce8" stroke="#d97706" stroke-width="1.2"/>
  <text x="360" y="177" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">b</text>
  <text x="360" y="197" text-anchor="middle" font-size="11" fill="#374151">Win/Loss ratio (odds)</text>

  <rect x="480" y="155" width="180" height="52" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="570" y="177" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">q = 1−p</text>
  <text x="570" y="197" text-anchor="middle" font-size="11" fill="#374151">Loss probability</text>

  <!-- Example -->
  <rect x="180" y="240" width="360" height="52" rx="6" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="360" y="262" text-anchor="middle" font-size="11" fill="#374151">Example: p=0.55, b=2 (2:1 payoff)</text>
  <text x="360" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">f* = (2×0.55 − 0.45) / 2 = 32.5% of capital</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>