<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="white"/>

  <!-- Title -->
  <text x="400" y="28" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">LoRA SFT Pipeline for Debiasing LLM Forecasts</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- ── TOP ROW: pipeline flow ── -->

  <!-- Box 1: Historical Data -->
  <rect x="30" y="65" width="145" height="72" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="102" y="90" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a73e8">Historical</text>
  <text x="102" y="107" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a73e8">Forecasting Data</text>
  <text x="102" y="126" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">Verified outcomes</text>

  <!-- Arrow 1 -->
  <line x1="175" y1="101" x2="210" y2="101" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Instruction Dataset -->
  <rect x="210" y="65" width="145" height="72" rx="8" fill="#fef7e0" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="282" y="90" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#996600">Instruction</text>
  <text x="282" y="107" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#996600">Dataset</text>
  <text x="282" y="126" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">10K–100K examples</text>

  <!-- Arrow 2 -->
  <line x1="355" y1="101" x2="390" y2="101" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: SFT + LoRA -->
  <rect x="390" y="55" width="155" height="92" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="467" y="80" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#ea4335">SFT + LoRA</text>
  <text x="467" y="97" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">Frozen base model</text>
  <text x="467" y="113" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">Rank r = 16, α = 32</text>
  <text x="467" y="129" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">~0.15% new params</text>

  <!-- Arrow 3 -->
  <line x1="545" y1="101" x2="580" y2="101" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 4: Debiased LLM -->
  <rect x="580" y="65" width="145" height="72" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="652" y="90" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#34a853">Debiased LLM</text>
  <text x="652" y="107" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#34a853">+ Adapter</text>
  <text x="652" y="126" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">Calibrated output</text>

  <!-- ── BOTTOM ROW: before / after comparison ── -->

  <!-- Before box -->
  <rect x="80" y="190" width="240" height="130" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="200" y="212" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#ea4335">Before fine-tuning</text>
  <text x="200" y="234" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">States 82% confidence</text>
  <text x="200" y="252" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">when empirical rate = 55%</text>
  <text x="200" y="274" font-family="Arial" font-size="11" text-anchor="middle" fill="#c00">Brier score: 0.31</text>
  <text x="200" y="292" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">Extrapolates trends blindly</text>
  <text x="200" y="310" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">Oversizes event positions</text>

  <!-- vs label -->
  <text x="400" y="262" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#aaa">vs</text>

  <!-- After box -->
  <rect x="480" y="190" width="240" height="130" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="600" y="212" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#34a853">After fine-tuning</text>
  <text x="600" y="234" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">States 58% confidence</text>
  <text x="600" y="252" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">when empirical rate = 55%</text>
  <text x="600" y="274" font-family="Arial" font-size="11" text-anchor="middle" fill="#1a7a2a">Brier score: 0.24</text>
  <text x="600" y="292" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">Anchors on base rates</text>
  <text x="600" y="310" font-family="Arial" font-size="11" text-anchor="middle" fill="#555">Tighter Kelly sizing</text>
</svg>
