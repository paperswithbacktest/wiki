<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="white"/>

  <!-- Title -->
  <text x="400" y="28" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">LLM Extrapolation Bias in Financial Forecasting</text>

  <!-- Axes -->
  <line x1="90" y1="300" x2="730" y2="300" stroke="#bbb" stroke-width="1.5"/>
  <line x1="90" y1="60" x2="90" y2="300" stroke="#bbb" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="410" y="334" font-family="Arial" font-size="12" text-anchor="middle" fill="#666">Time</text>
  <text x="28" y="185" font-family="Arial" font-size="12" text-anchor="middle" fill="#666" transform="rotate(-90,28,185)">Forecast Value</text>

  <!-- Forecast horizon vertical dashed line -->
  <line x1="420" y1="58" x2="420" y2="300" stroke="#aaa" stroke-width="1.2" stroke-dasharray="7,5"/>
  <text x="420" y="52" font-family="Arial" font-size="11" text-anchor="middle" fill="#888">Forecast horizon</text>

  <!-- Historical band (light blue fill) -->
  <polygon points="90,295 160,272 240,250 330,230 420,210 420,225 330,246 240,266 160,288 90,308" fill="#e8f0fe" opacity="0.5"/>

  <!-- Historical line (actual data) -->
  <polyline points="90,295 160,270 240,248 330,229 420,210" fill="none" stroke="#1a73e8" stroke-width="2.5"/>

  <!-- Historical data dots -->
  <circle cx="90" cy="295" r="4.5" fill="#1a73e8"/>
  <circle cx="160" cy="270" r="4.5" fill="#1a73e8"/>
  <circle cx="240" cy="248" r="4.5" fill="#1a73e8"/>
  <circle cx="330" cy="229" r="4.5" fill="#1a73e8"/>
  <circle cx="420" cy="210" r="4.5" fill="#1a73e8"/>

  <!-- Rational forecast (green, flattening/mean-reverting) -->
  <polyline points="420,210 500,218 580,222 660,224 720,225" fill="none" stroke="#34a853" stroke-width="2.5" stroke-dasharray="10,5"/>

  <!-- Rational forecast dots -->
  <circle cx="500" cy="218" r="4" fill="#34a853"/>
  <circle cx="580" cy="222" r="4" fill="#34a853"/>
  <circle cx="660" cy="224" r="4" fill="#34a853"/>
  <circle cx="720" cy="225" r="4" fill="#34a853"/>

  <!-- Rational uncertainty band -->
  <polygon points="420,210 500,208 580,210 660,212 720,213 720,238 660,237 580,235 500,232 420,210" fill="#e6f4ea" opacity="0.45"/>

  <!-- LLM biased forecast (red, trend continuation) -->
  <polyline points="420,210 500,182 580,152 660,120 720,96" fill="none" stroke="#ea4335" stroke-width="2.5" stroke-dasharray="10,5"/>

  <!-- LLM bias dots -->
  <circle cx="500" cy="182" r="4" fill="#ea4335"/>
  <circle cx="580" cy="152" r="4" fill="#ea4335"/>
  <circle cx="660" cy="120" r="4" fill="#ea4335"/>
  <circle cx="720" cy="96" r="4" fill="#ea4335"/>

  <!-- Divergence annotation arrow -->
  <line x1="640" y1="130" x2="640" y2="220" stroke="#888" stroke-width="1" marker-end="url(#arrowGray)"/>
  <text x="648" y="180" font-family="Arial" font-size="11" fill="#888">Bias gap</text>

  <!-- Legend -->
  <rect x="530" y="255" width="190" height="90" rx="6" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <line x1="545" y1="272" x2="575" y2="272" stroke="#1a73e8" stroke-width="2.5"/>
  <circle cx="560" cy="272" r="4" fill="#1a73e8"/>
  <text x="582" y="276" font-family="Arial" font-size="11" fill="#333">Historical data</text>

  <line x1="545" y1="295" x2="575" y2="295" stroke="#34a853" stroke-width="2.5" stroke-dasharray="10,5"/>
  <circle cx="560" cy="295" r="4" fill="#34a853"/>
  <text x="582" y="299" font-family="Arial" font-size="11" fill="#333">Rational forecast</text>

  <line x1="545" y1="318" x2="575" y2="318" stroke="#ea4335" stroke-width="2.5" stroke-dasharray="10,5"/>
  <circle cx="560" cy="318" r="4" fill="#ea4335"/>
  <text x="582" y="322" font-family="Arial" font-size="11" fill="#333">LLM biased forecast</text>

  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>
</svg>
