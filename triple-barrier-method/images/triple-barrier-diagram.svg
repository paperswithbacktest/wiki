<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="white"/>
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">Triple-Barrier Method: Labeling Framework</text>
  <line x1="80" y1="440" x2="720" y2="440" stroke="#999" stroke-width="1.5"/>
  <line x1="80" y1="440" x2="80" y2="60" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5f6368">Time</text>
  <text x="30" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5f6368" transform="rotate(-90, 30, 250)">Price</text>
  <line x1="80" y1="140" x2="580" y2="140" stroke="#34a853" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="610" y="145" font-family="Arial, sans-serif" font-size="12" fill="#34a853" font-weight="bold">Upper Barrier</text>
  <text x="610" y="162" font-family="Arial, sans-serif" font-size="11" fill="#34a853">(Profit-Taking)</text>
  <line x1="80" y1="370" x2="580" y2="370" stroke="#ea4335" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="610" y="375" font-family="Arial, sans-serif" font-size="12" fill="#ea4335" font-weight="bold">Lower Barrier</text>
  <text x="610" y="392" font-family="Arial, sans-serif" font-size="11" fill="#ea4335">(Stop-Loss)</text>
  <line x1="580" y1="60" x2="580" y2="440" stroke="#1a73e8" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="580" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-weight="bold">Vertical Barrier (Max Hold)</text>
  <circle cx="80" cy="260" r="6" fill="#1a73e8"/>
  <text x="95" y="255" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-weight="bold">Entry</text>
  <polyline points="80,260 120,245 160,230 200,210 240,195 280,180 320,165 360,150 380,140" fill="none" stroke="#34a853" stroke-width="2" opacity="0.8"/>
  <circle cx="380" cy="140" r="5" fill="#34a853"/>
  <text x="390" y="130" font-family="Arial, sans-serif" font-size="11" fill="#34a853">Label = +1</text>
  <polyline points="80,260 130,275 170,290 210,310 250,330 290,350 320,370" fill="none" stroke="#ea4335" stroke-width="2" opacity="0.8"/>
  <circle cx="320" cy="370" r="5" fill="#ea4335"/>
  <text x="330" y="400" font-family="Arial, sans-serif" font-size="11" fill="#ea4335">Label = -1</text>
  <polyline points="80,260 130,250 180,265 230,255 280,270 330,260 380,265 430,258 480,270 530,262 580,268" fill="none" stroke="#1a73e8" stroke-width="2" opacity="0.8"/>
  <circle cx="580" cy="268" r="5" fill="#1a73e8"/>
  <text x="530" y="295" font-family="Arial, sans-serif" font-size="11" fill="#1a73e8">Label = 0</text>
  <rect x="100" y="60" width="200" height="65" rx="5" fill="white" stroke="#ddd" stroke-width="1"/>
  <circle cx="115" cy="78" r="4" fill="#34a853"/><text x="125" y="82" font-family="Arial, sans-serif" font-size="11" fill="#333">Path hits upper barrier = +1</text>
  <circle cx="115" cy="98" r="4" fill="#ea4335"/><text x="125" y="102" font-family="Arial, sans-serif" font-size="11" fill="#333">Path hits lower barrier = -1</text>
  <circle cx="115" cy="118" r="4" fill="#1a73e8"/><text x="125" y="122" font-family="Arial, sans-serif" font-size="11" fill="#333">Path hits vertical barrier = 0</text>
</svg>