<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <rect width="800" height="350" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#1a1a1a" font-weight="bold">Research Map: AFML Concept Network</text>
  <!-- Central node -->
  <ellipse cx="400" cy="180" rx="80" ry="35" fill="#1a73e8" opacity="0.15" stroke="#1a73e8" stroke-width="2"/>
  <text x="400" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-weight="bold">AFML</text>
  <text x="400" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8">Framework</text>
  <!-- Data nodes -->
  <ellipse cx="130" cy="90" rx="70" ry="28" fill="#34a853" opacity="0.12" stroke="#34a853" stroke-width="1.5"/>
  <text x="130" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34a853">Bars &amp; Filters</text>
  <line x1="200" y1="100" x2="320" y2="165" stroke="#34a853" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="130" cy="180" rx="70" ry="28" fill="#ea4335" opacity="0.12" stroke="#ea4335" stroke-width="1.5"/>
  <text x="130" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea4335">Labeling</text>
  <line x1="200" y1="180" x2="320" y2="180" stroke="#ea4335" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="130" cy="270" rx="70" ry="28" fill="#fbbc04" opacity="0.12" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="130" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b8860b">Features</text>
  <line x1="200" y1="265" x2="320" y2="195" stroke="#fbbc04" stroke-width="1.5" opacity="0.5"/>
  <!-- Right nodes -->
  <ellipse cx="670" cy="90" rx="70" ry="28" fill="#9c27b0" opacity="0.12" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="670" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9c27b0">ML Models</text>
  <line x1="480" y1="165" x2="600" y2="100" stroke="#9c27b0" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="670" cy="180" rx="70" ry="28" fill="#ff6f00" opacity="0.12" stroke="#ff6f00" stroke-width="1.5"/>
  <text x="670" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff6f00">Validation</text>
  <line x1="480" y1="180" x2="600" y2="180" stroke="#ff6f00" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="670" cy="270" rx="70" ry="28" fill="#00695c" opacity="0.12" stroke="#00695c" stroke-width="1.5"/>
  <text x="670" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#00695c">Portfolio</text>
  <line x1="480" y1="195" x2="600" y2="265" stroke="#00695c" stroke-width="1.5" opacity="0.5"/>
  <!-- Sub-labels -->
  <text x="130" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">Tick/Volume/Dollar bars</text>
  <text x="130" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">CUSUM filter</text>
  <text x="130" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">Triple-Barrier, Meta-Labels</text>
  <text x="130" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">Frac. Diff., Entropy</text>
  <text x="670" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">Ensembles, Bet Sizing</text>
  <text x="670" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">Feature Importance</text>
  <text x="670" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">Purged CV, CPCV</text>
  <text x="670" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">Deflated Sharpe</text>
  <text x="670" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">HRP, CLA</text>
