  <text x="230" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Partners</text>
  <text x="230" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5f6368">$13B AUM</text>
