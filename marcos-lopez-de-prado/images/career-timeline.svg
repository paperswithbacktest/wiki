  <!-- Timeline line -->
  <line x1="60" y1="100" x2="740" y2="100" stroke="#1a73e8" stroke-width="3"/>
  <!-- PhD 1 -->
  <circle cx="100" cy="100" r="8" fill="#1a73e8"/>
  <text x="100" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a73e8" font-weight="bold">2003</text>
  <text x="100" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">PhD Financial</text>
  <text x="100" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Econometrics</text>
  <!-- Guggenheim -->
  <circle cx="230" cy="100" r="8" fill="#34a853"/>
  <text x="230" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34a853" font-weight="bold">2007</text>
