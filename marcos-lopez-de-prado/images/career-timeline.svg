  <text x="302" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34a853">Meta-Labeling</text>
  <rect x="390" y="250" width="155" height="35" rx="5" fill="#ea4335" opacity="0.1" stroke="#ea4335" stroke-width="1"/>
  <text x="467" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ea4335">HRP Portfolios</text>
  <rect x="555" y="250" width="190" height="35" rx="5" fill="#fbbc04" opacity="0.1" stroke="#fbbc04" stroke-width="1"/>
  <text x="650" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b8860b">VPIN / Order Flow</text>
  <!-- Row 2 -->
  <rect x="60" y="295" width="155" height="35" rx="5" fill="#9c27b0" opacity="0.1" stroke="#9c27b0" stroke-width="1"/>
  <text x="137" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9c27b0">Fractional Diff.</text>
  <rect x="225" y="295" width="155" height="35" rx="5" fill="#ff6f00" opacity="0.1" stroke="#ff6f00" stroke-width="1"/>
  <text x="302" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ff6f00">CPCV / Purged CV</text>
  <rect x="390" y="295" width="155" height="35" rx="5" fill="#00695c" opacity="0.1" stroke="#00695c" stroke-width="1"/>
  <text x="467" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#00695c">Deflated Sharpe Ratio</text>
  <rect x="555" y="295" width="190" height="35" rx="5" fill="#5f6368" opacity="0.1" stroke="#5f6368" stroke-width="1"/>
  <text x="650" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Critical Line Algo.</text>
  <!-- Awards row -->
  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Awards: Quant of the Year (2019, 2021) · Bernstein Fabozzi / Jacobs Levy (2024) · Knight OMC (2024)</text>
</svg>