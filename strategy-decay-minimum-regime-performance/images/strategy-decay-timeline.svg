<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" fill="#1a1a1a" font-weight="bold">Strategy Decay: Rolling Sharpe Across Regimes</text>

  <!-- Axes -->
  <line x1="80" y1="290" x2="760" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="70" x2="80" y2="290" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="70" y="295" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.0</text>
  <text x="70" y="240" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.4</text>
  <text x="70" y="185" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.8</text>
  <text x="70" y="130" text-anchor="end" font-family="Arial" font-size="11" fill="#333">1.2</text>
  <text x="70" y="75" text-anchor="end" font-family="Arial" font-size="11" fill="#333">1.6</text>
  <text x="30" y="180" font-family="Arial" font-size="12" fill="#333" transform="rotate(-90 30 180)" text-anchor="middle">Rolling 3y Sharpe</text>

  <!-- Regime background bands -->
  <rect x="80" y="70" width="220" height="220" fill="#e6f4ea" opacity="0.45"/>
  <rect x="300" y="70" width="150" height="220" fill="#fef7e0" opacity="0.45"/>
  <rect x="450" y="70" width="180" height="220" fill="#fce8e6" opacity="0.45"/>
  <rect x="630" y="70" width="130" height="220" fill="#e8f0fe" opacity="0.45"/>

  <!-- Regime labels -->
  <text x="190" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#1e8e3e" font-weight="bold">Low-vol bull</text>
  <text x="375" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#f9a825" font-weight="bold">2008 crisis</text>
  <text x="540" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#ea4335" font-weight="bold">Post-GFC low-rate</text>
  <text x="695" y="88" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a73e8" font-weight="bold">2022 rate shock</text>

  <!-- In-sample / OOS divider -->
  <line x1="420" y1="70" x2="420" y2="290" stroke="#666" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="415" y="65" text-anchor="end" font-family="Arial" font-size="11" fill="#666" font-style="italic">In-sample</text>
  <text x="425" y="65" font-family="Arial" font-size="11" fill="#666" font-style="italic">Out-of-sample</text>

  <!-- Sharpe curve -->
  <path d="M 90,125 L 140,110 L 180,118 L 220,132 L 260,140 L 300,150 L 340,210 L 380,195 L 420,175 L 460,215 L 500,250 L 540,268 L 580,260 L 620,272 L 660,230 L 700,220 L 740,245" stroke="#1a73e8" stroke-width="2.5" fill="none"/>

  <!-- Key markers -->
  <circle cx="200" cy="120" r="4" fill="#1e8e3e"/>
  <text x="205" y="110" font-family="Arial" font-size="10" fill="#1e8e3e">SR≈1.1</text>
  <circle cx="480" cy="235" r="4" fill="#ea4335"/>
  <text x="485" y="226" font-family="Arial" font-size="10" fill="#ea4335">SR≈0.3</text>
  <circle cx="695" cy="235" r="4" fill="#1a73e8"/>
  <text x="695" y="255" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a73e8">SR≈0.3</text>

  <!-- X-axis labels -->
  <text x="190" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">2000</text>
  <text x="375" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">2009</text>
  <text x="540" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">2018</text>
  <text x="695" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">2024</text>

  <!-- MRP annotation -->
  <text x="400" y="340" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a1a1a" font-weight="bold">MRP = min regime Sharpe ≈ 0.3 — masked by full-sample mean of 0.9</text>
</svg>
