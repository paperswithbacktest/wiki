<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" fill="#1a1a1a" font-weight="bold">Per-Regime Sharpe and the Minimum Regime Performance</text>

  <!-- Axes -->
  <line x1="90" y1="290" x2="760" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="90" y1="70" x2="90" y2="290" stroke="#333" stroke-width="1.5"/>

  <!-- Y-axis labels (Sharpe 0 to 1.6) -->
  <text x="80" y="295" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.0</text>
  <text x="80" y="235" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.4</text>
  <text x="80" y="175" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.8</text>
  <text x="80" y="115" text-anchor="end" font-family="Arial" font-size="11" fill="#333">1.2</text>
  <text x="80" y="75" text-anchor="end" font-family="Arial" font-size="11" fill="#333">1.6</text>
  <text x="40" y="180" font-family="Arial" font-size="12" fill="#333" transform="rotate(-90 40 180)" text-anchor="middle">Within-regime Sharpe</text>

  <!-- Full-sample Sharpe reference line at SR ~0.9 => y = 290 - (0.9/1.6)*220 = 290 - 123.75 = 166.25 -->
  <line x1="90" y1="166" x2="760" y2="166" stroke="#5f6368" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="755" y="160" text-anchor="end" font-family="Arial" font-size="11" fill="#5f6368" font-style="italic">Full-sample Sharpe ≈ 0.9</text>

  <!-- Bars: 5 regimes, width 90, gap 30. Start x=120. -->
  <!-- Regime 1: Low-vol bull, SR 1.3 -> h = 1.3/1.6*220 = 178.75 -->
  <rect x="120" y="111" width="90" height="179" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="165" y="103" text-anchor="middle" font-family="Arial" font-size="12" fill="#1e8e3e" font-weight="bold">1.3</text>
  <text x="165" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Low-vol</text>
  <text x="165" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">bull</text>

  <!-- Regime 2: Range-bound, SR 0.95 -> h = 130.625 -->
  <rect x="240" y="159" width="90" height="131" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="285" y="151" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a73e8" font-weight="bold">0.95</text>
  <text x="285" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Range-</text>
  <text x="285" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">bound</text>

  <!-- Regime 3: Crisis, SR 1.1 -> h = 151.25 -->
  <rect x="360" y="138" width="90" height="152" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="405" y="130" text-anchor="middle" font-family="Arial" font-size="12" fill="#1e8e3e" font-weight="bold">1.1</text>
  <text x="405" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Crisis</text>

  <!-- Regime 4: Rate hike, SR 0.2 -> h = 27.5 — THE MIN -->
  <rect x="480" y="262" width="90" height="28" fill="#fce8e6" stroke="#ea4335" stroke-width="3"/>
  <text x="525" y="254" text-anchor="middle" font-family="Arial" font-size="12" fill="#ea4335" font-weight="bold">0.2</text>
  <text x="525" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Rate</text>
  <text x="525" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">hike</text>

  <!-- Regime 5: Disinflation, SR 0.85 -> h = 116.875 -->
  <rect x="600" y="173" width="90" height="117" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="645" y="165" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a73e8" font-weight="bold">0.85</text>
  <text x="645" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Disin-</text>
  <text x="645" y="325" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">flation</text>

  <!-- MRP annotation arrow -->
  <line x1="525" y1="260" x2="525" y2="225" stroke="#ea4335" stroke-width="1.5"/>
  <polygon points="520,229 530,229 525,222" fill="#ea4335"/>
  <rect x="430" y="200" width="190" height="22" rx="4" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="525" y="215" text-anchor="middle" font-family="Arial" font-size="11" fill="#ea4335" font-weight="bold">MRP = 0.2 (fragile)</text>

  <!-- Footer -->
  <text x="400" y="350" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-style="italic">Full-sample Sharpe averages away the regime in which the strategy nearly stops working.</text>
</svg>
