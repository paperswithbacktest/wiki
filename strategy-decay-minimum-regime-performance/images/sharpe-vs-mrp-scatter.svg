<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="white"/>
  <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" fill="#1a1a1a" font-weight="bold">Full-Sample Sharpe vs Minimum Regime Performance</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368" font-style="italic">Two strategies with the same Sharpe can have very different durability.</text>

  <!-- Axes: plot area from x=100 to x=720 (width 620), y=90 to y=420 (height 330) -->
  <line x1="100" y1="420" x2="720" y2="420" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="90" x2="100" y2="420" stroke="#333" stroke-width="1.5"/>

  <!-- X-axis: Full-sample Sharpe, 0 to 2.0 -->
  <text x="95" y="435" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.0</text>
  <text x="100" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#333"></text>
  <text x="255" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">0.5</text>
  <text x="410" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">1.0</text>
  <text x="565" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">1.5</text>
  <text x="720" y="435" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">2.0</text>
  <text x="410" y="465" text-anchor="middle" font-family="Arial" font-size="13" fill="#333" font-weight="bold">Full-sample Sharpe</text>

  <!-- Y-axis: MRP, 0 to 1.2 -->
  <text x="90" y="425" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.0</text>
  <text x="90" y="343" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.3</text>
  <text x="90" y="260" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.6</text>
  <text x="90" y="178" text-anchor="end" font-family="Arial" font-size="11" fill="#333">0.9</text>
  <text x="90" y="95" text-anchor="end" font-family="Arial" font-size="11" fill="#333">1.2</text>
  <text x="50" y="255" font-family="Arial" font-size="13" fill="#333" transform="rotate(-90 50 255)" text-anchor="middle" font-weight="bold">Minimum Regime Performance</text>

  <!-- Diagonal: MRP = Sharpe (perfect robustness). x range 100-720, y-range 420-90. Slope: 330/620*(1.2/2.0) -->
  <!-- MRP = 0 at Sharpe=0: (100,420). MRP = Sharpe: at Sharpe=1.2 y is 90, x is 100 + 1.2/2.0 * 620 = 100+372=472 -->
  <line x1="100" y1="420" x2="472" y2="90" stroke="#34a853" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="470" y="85" font-family="Arial" font-size="11" fill="#1e8e3e" font-style="italic">MRP = Sharpe (ideal)</text>

  <!-- Fragile zone: Sharpe high, MRP low -->
  <rect x="410" y="350" width="310" height="70" fill="#fce8e6" opacity="0.4"/>
  <text x="565" y="395" text-anchor="middle" font-family="Arial" font-size="12" fill="#ea4335" font-weight="bold">Fragile zone — regime-dependent alpha</text>

  <!-- Durable zone: MRP high -->
  <rect x="410" y="100" width="310" height="100" fill="#e6f4ea" opacity="0.4"/>
  <text x="565" y="135" text-anchor="middle" font-family="Arial" font-size="12" fill="#1e8e3e" font-weight="bold">Durable zone</text>
  <text x="565" y="152" text-anchor="middle" font-family="Arial" font-size="11" fill="#1e8e3e">robust across regimes</text>

  <!-- Data points. x = 100 + Sharpe/2.0*620; y = 420 - MRP/1.2*330 -->
  <!-- A: ML momentum, Sharpe 1.6, MRP 0.15 => x=596, y=379 -->
  <circle cx="596" cy="379" r="8" fill="#ea4335" stroke="#a50e0e" stroke-width="1.5"/>
  <text x="606" y="384" font-family="Arial" font-size="11" fill="#1a1a1a">A: ML momentum (fragile)</text>

  <!-- B: Diversified multi-strat, Sharpe 1.5, MRP 0.55 => x=565, y=269 -->
  <circle cx="565" cy="269" r="8" fill="#34a853" stroke="#0b6b29" stroke-width="1.5"/>
  <text x="575" y="274" font-family="Arial" font-size="11" fill="#1a1a1a">B: Multi-strat (durable)</text>

  <!-- C: Value factor, Sharpe 0.7, MRP -0.05 => clamp to 0.02 y=414 -->
  <circle cx="317" cy="414" r="7" fill="#ea4335" stroke="#a50e0e" stroke-width="1.5"/>
  <text x="325" y="412" font-family="Arial" font-size="11" fill="#1a1a1a">C: Value factor 1990–2024</text>

  <!-- D: Trend following CTA, Sharpe 0.9, MRP 0.45 => x=379, y=296 -->
  <circle cx="379" cy="296" r="7" fill="#1a73e8" stroke="#0b4691" stroke-width="1.5"/>
  <text x="389" y="301" font-family="Arial" font-size="11" fill="#1a1a1a">D: Trend-following CTA</text>

  <!-- E: Stat-arb pairs, Sharpe 1.2, MRP 0.35 => x=472, y=324 -->
  <circle cx="472" cy="324" r="7" fill="#fbbc04" stroke="#b9860b" stroke-width="1.5"/>
  <text x="482" y="329" font-family="Arial" font-size="11" fill="#1a1a1a">E: Stat-arb pairs</text>

  <!-- F: LSTM equity, Sharpe 1.3, MRP 0.05 => x=503, y=406 -->
  <circle cx="503" cy="406" r="7" fill="#ea4335" stroke="#a50e0e" stroke-width="1.5"/>
  <text x="513" y="411" font-family="Arial" font-size="11" fill="#1a1a1a">F: LSTM equity predictor</text>

  <!-- G: Risk parity, Sharpe 0.8, MRP 0.2 => x=348, y=365 -->
  <circle cx="348" cy="365" r="7" fill="#fbbc04" stroke="#b9860b" stroke-width="1.5"/>
  <text x="358" y="370" font-family="Arial" font-size="11" fill="#1a1a1a">G: Equity-bond risk parity</text>

  <!-- Footer -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial" font-size="11" fill="#333" font-style="italic">High-Sharpe / low-MRP strategies are marketed well but break when the regime turns.</text>
</svg>
