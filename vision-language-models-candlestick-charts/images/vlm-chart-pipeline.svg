<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <rect width="800" height="360" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" fill="#1a1a1a" font-weight="bold">Vision-Language Model: Candlestick Chart → Decision</text>

  <!-- Chart image box -->
  <rect x="30" y="80" width="150" height="200" rx="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="105" y="106" text-anchor="middle" font-family="Arial" font-size="14" fill="#1a73e8" font-weight="bold">Chart Image</text>
  <!-- mini candles -->
  <line x1="60" y1="135" x2="60" y2="245" stroke="#5f6368" stroke-width="1"/>
  <rect x="68" y="180" width="10" height="40" fill="#34a853"/>
  <line x1="73" y1="165" x2="73" y2="180" stroke="#34a853" stroke-width="1.5"/>
  <line x1="73" y1="220" x2="73" y2="235" stroke="#34a853" stroke-width="1.5"/>
  <rect x="88" y="160" width="10" height="35" fill="#34a853"/>
  <line x1="93" y1="148" x2="93" y2="160" stroke="#34a853" stroke-width="1.5"/>
  <rect x="108" y="170" width="10" height="30" fill="#ea4335"/>
  <line x1="113" y1="158" x2="113" y2="170" stroke="#ea4335" stroke-width="1.5"/>
  <line x1="113" y1="200" x2="113" y2="212" stroke="#ea4335" stroke-width="1.5"/>
  <rect x="128" y="150" width="10" height="28" fill="#34a853"/>
  <line x1="133" y1="138" x2="133" y2="150" stroke="#34a853" stroke-width="1.5"/>
  <text x="105" y="268" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">OHLC bars + axes</text>

  <line x1="180" y1="180" x2="212" y2="180" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vision encoder -->
  <rect x="215" y="100" width="160" height="160" rx="10" fill="#fef7e0" stroke="#fbbc04" stroke-width="2"/>
  <text x="295" y="126" text-anchor="middle" font-family="Arial" font-size="14" fill="#f9a825" font-weight="bold">Vision Encoder</text>
  <text x="295" y="152" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Vision Transformer</text>
  <text x="295" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Image → patches</text>
  <text x="295" y="192" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Patch embeddings</text>
  <text x="295" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Projection layer</text>
  <text x="295" y="236" text-anchor="middle" font-family="Arial" font-size="11" fill="#f9a825" font-style="italic">→ image tokens</text>

  <line x1="375" y1="180" x2="407" y2="180" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM reasoning -->
  <rect x="410" y="100" width="160" height="160" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="490" y="126" text-anchor="middle" font-family="Arial" font-size="14" fill="#ea4335" font-weight="bold">LLM Reasoning</text>
  <text x="490" y="152" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Joint attention over</text>
  <text x="490" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">image + text tokens</text>
  <text x="490" y="192" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Decode candles</text>
  <text x="490" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Recognise patterns</text>
  <text x="490" y="232" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Chain-of-thought</text>

  <line x1="570" y1="180" x2="602" y2="180" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="605" y="100" width="165" height="160" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="687" y="126" text-anchor="middle" font-family="Arial" font-size="14" fill="#34a853" font-weight="bold">Output</text>
  <text x="687" y="152" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Narrative:</text>
  <text x="687" y="170" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">"bullish engulfing</text>
  <text x="687" y="186" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">near support"</text>
  <text x="687" y="212" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Signal: BUY / HOLD</text>
  <text x="687" y="234" text-anchor="middle" font-family="Arial" font-size="11" fill="#34a853">+ confidence</text>

  <text x="400" y="320" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368" font-style="italic">Use the verdict as a soft feature inside a pipeline — not as a direct order</text>
</svg>
