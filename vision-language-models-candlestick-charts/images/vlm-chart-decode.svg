<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="white"/>
  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" fill="#1a1a1a" font-weight="bold">What a VLM Must Decode in a Candlestick</text>

  <!-- Anatomy of a candle (left) -->
  <rect x="40" y="70" width="220" height="300" rx="10" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5"/>
  <text x="150" y="96" text-anchor="middle" font-family="Arial" font-size="13" fill="#202124" font-weight="bold">Anatomy of one bar (OHLC)</text>

  <!-- candle glyph -->
  <line x1="150" y1="120" x2="150" y2="160" stroke="#34a853" stroke-width="2"/>
  <rect x="132" y="160" width="36" height="120" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <line x1="150" y1="280" x2="150" y2="320" stroke="#34a853" stroke-width="2"/>

  <text x="200" y="124" font-family="Arial" font-size="11" fill="#ea4335">High (wick top)</text>
  <text x="200" y="168" font-family="Arial" font-size="11" fill="#1a73e8">Close</text>
  <text x="200" y="278" font-family="Arial" font-size="11" fill="#1a73e8">Open</text>
  <text x="200" y="322" font-family="Arial" font-size="11" fill="#ea4335">Low (wick bottom)</text>
  <text x="150" y="352" text-anchor="middle" font-family="Arial" font-size="10" fill="#5f6368">colour ⇒ up vs down session</text>

  <line x1="270" y1="220" x2="302" y2="220" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Four decode steps (right) -->
  <rect x="310" y="70" width="460" height="62" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="330" y="96" font-family="Arial" font-size="13" fill="#1a73e8" font-weight="bold">1 · Localise axes &amp; scale</text>
  <text x="330" y="118" font-family="Arial" font-size="11" fill="#5f6368">Read price ticks &amp; dates — chart OCR, the main error source</text>

  <rect x="310" y="142" width="460" height="62" rx="8" fill="#fef7e0" stroke="#fbbc04" stroke-width="2"/>
  <text x="330" y="168" font-family="Arial" font-size="13" fill="#f9a825" font-weight="bold">2 · Decode each candle</text>
  <text x="330" y="190" font-family="Arial" font-size="11" fill="#5f6368">Body vs wick, open/close order, range — four numbers per glyph</text>

  <rect x="310" y="214" width="460" height="62" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="330" y="240" font-family="Arial" font-size="13" fill="#ea4335" font-weight="bold">3 · Aggregate into patterns</text>
  <text x="330" y="262" font-family="Arial" font-size="11" fill="#5f6368">Engulfing, doji, head-and-shoulders; trend / range / breakout</text>

  <rect x="310" y="286" width="460" height="62" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="330" y="312" font-family="Arial" font-size="13" fill="#34a853" font-weight="bold">4 · Reason to a decision</text>
  <text x="330" y="334" font-family="Arial" font-size="11" fill="#5f6368">Forecast or action + confidence — where reasoning, not perception, dominates</text>

  <text x="400" y="392" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368" font-style="italic">Perception fails on steps 1–2; reasoning fails on steps 3–4 — and they fail differently</text>
</svg>
