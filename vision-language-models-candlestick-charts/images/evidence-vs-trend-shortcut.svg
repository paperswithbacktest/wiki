<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" width="800" height="470">
  <rect width="800" height="470" fill="white"/>
  <defs>
    <marker id="arrowK" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-family="Arial" font-size="18" fill="#1a1a1a" font-weight="bold">The Grounding Problem: Evidence vs Trend Shortcut</text>
  <text x="400" y="54" text-anchor="middle" font-family="Arial" font-size="12" fill="#5f6368">Doppelgänger charts share one trend but carry opposite local candle evidence</text>

  <!-- Chart A -->
  <rect x="40" y="72" width="320" height="170" rx="10" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5"/>
  <text x="200" y="96" text-anchor="middle" font-family="Arial" font-size="13" fill="#202124" font-weight="bold">Chart A — same up-trend, bullish candles</text>
  <line x1="60" y1="225" x2="340" y2="225" stroke="#9aa0a6" stroke-width="1"/>
  <!-- trend line up -->
  <line x1="70" y1="210" x2="330" y2="120" stroke="#1a73e8" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- bullish candles -->
  <rect x="90" y="180" width="9" height="28" fill="#34a853"/><line x1="94" y1="170" x2="94" y2="180" stroke="#34a853"/><line x1="94" y1="208" x2="94" y2="214" stroke="#34a853"/>
  <rect x="130" y="166" width="9" height="30" fill="#34a853"/><line x1="134" y1="156" x2="134" y2="166" stroke="#34a853"/>
  <rect x="170" y="156" width="9" height="26" fill="#34a853"/><line x1="174" y1="146" x2="174" y2="156" stroke="#34a853"/>
  <rect x="210" y="146" width="9" height="28" fill="#34a853"/><line x1="214" y1="136" x2="214" y2="146" stroke="#34a853"/>
  <rect x="250" y="134" width="9" height="24" fill="#34a853"/><line x1="254" y1="124" x2="254" y2="134" stroke="#34a853"/>
  <rect x="290" y="124" width="9" height="26" fill="#34a853"/><line x1="294" y1="114" x2="294" y2="124" stroke="#34a853"/>

  <!-- Chart B -->
  <rect x="440" y="72" width="320" height="170" rx="10" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5"/>
  <text x="600" y="96" text-anchor="middle" font-family="Arial" font-size="13" fill="#202124" font-weight="bold">Chart B — same up-trend, bearish candles</text>
  <line x1="460" y1="225" x2="740" y2="225" stroke="#9aa0a6" stroke-width="1"/>
  <line x1="470" y1="210" x2="730" y2="120" stroke="#1a73e8" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- bearish candles (same envelope, red bodies, weak/topping wicks) -->
  <rect x="490" y="180" width="9" height="26" fill="#ea4335"/><line x1="494" y1="168" x2="494" y2="180" stroke="#ea4335"/>
  <rect x="530" y="168" width="9" height="24" fill="#ea4335"/><line x1="534" y1="156" x2="534" y2="168" stroke="#ea4335"/>
  <rect x="570" y="158" width="9" height="22" fill="#ea4335"/><line x1="574" y1="144" x2="574" y2="158" stroke="#ea4335"/>
  <rect x="610" y="150" width="9" height="22" fill="#ea4335"/><line x1="614" y1="134" x2="614" y2="150" stroke="#ea4335"/>
  <rect x="650" y="140" width="9" height="22" fill="#ea4335"/><line x1="654" y1="126" x2="654" y2="140" stroke="#ea4335"/>
  <rect x="690" y="130" width="9" height="24" fill="#ea4335"/><line x1="694" y1="112" x2="694" y2="130" stroke="#ea4335"/>

  <!-- Responders -->
  <line x1="200" y1="242" x2="200" y2="278" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowK)"/>
  <line x1="600" y1="242" x2="600" y2="278" stroke="#5f6368" stroke-width="2" marker-end="url(#arrowK)"/>

  <!-- Grounded responder -->
  <rect x="60" y="282" width="680" height="78" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="80" y="308" font-family="Arial" font-size="14" fill="#34a853" font-weight="bold">Grounded responder — reads the candles</text>
  <text x="80" y="332" font-family="Arial" font-size="12" fill="#333">Chart A → BUY   ·   Chart B → SELL/avoid.  Prediction flips with the evidence.</text>
  <text x="80" y="351" font-family="Arial" font-size="12" fill="#1a8a4a" font-weight="bold">Counterfactual gap Δ is large  ✓</text>

  <!-- Shortcut responder -->
  <rect x="60" y="372" width="680" height="78" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="80" y="398" font-family="Arial" font-size="14" fill="#ea4335" font-weight="bold">Trend-shortcut responder — follows the slope</text>
  <text x="80" y="422" font-family="Arial" font-size="12" fill="#333">Chart A → BUY   ·   Chart B → BUY.  Ignores the candles, copies the trend.</text>
  <text x="80" y="441" font-family="Arial" font-size="12" fill="#c5221f" font-weight="bold">Counterfactual gap Δ ≈ 0  ✗  — looks fluent, isn't grounded</text>
</svg>
