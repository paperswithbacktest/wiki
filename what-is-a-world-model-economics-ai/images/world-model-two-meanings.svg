<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#333" font-weight="bold">Two Meanings of "World Model"</text>

  <!-- Left: Economics -->
  <rect x="30" y="55" width="350" height="340" rx="12" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="205" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1a73e8" font-weight="bold">Economics World Model</text>
  <text x="205" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">(Top-Down, Equation-Based)</text>

  <rect x="60" y="130" width="130" height="50" rx="6" fill="white" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="125" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">DSGE Models</text>

  <rect x="210" y="130" width="140" height="50" rx="6" fill="white" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="280" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Oxford / IMF GEM</text>

  <rect x="60" y="200" width="130" height="50" rx="6" fill="white" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="125" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">VAR / SVAR</text>

  <rect x="210" y="200" width="140" height="50" rx="6" fill="white" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="280" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">IS-LM / AD-AS</text>

  <rect x="100" y="280" width="210" height="50" rx="6" fill="#1a73e8" opacity="0.15" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="205" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a73e8" font-weight="bold">Macro Forecasting &amp;</text>
  <text x="205" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a73e8" font-weight="bold">Policy Simulation</text>

  <line x1="125" y1="180" x2="125" y2="200" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="180" x2="280" y2="200" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="205" y1="250" x2="205" y2="280" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right: AI -->
  <rect x="420" y="55" width="350" height="340" rx="12" fill="#fef7e0" stroke="#f9ab00" stroke-width="2"/>
  <text x="595" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e37400" font-weight="bold">AI / ML World Model</text>
  <text x="595" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">(Bottom-Up, Learned)</text>

  <rect x="450" y="130" width="130" height="50" rx="6" fill="white" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="515" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Ha &amp; Schmidhuber</text>

  <rect x="600" y="130" width="140" height="50" rx="6" fill="white" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="670" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Dreamer / MuZero</text>

  <rect x="450" y="200" width="130" height="50" rx="6" fill="white" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="515" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Model-Based RL</text>

  <rect x="600" y="200" width="140" height="50" rx="6" fill="white" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="670" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">NVIDIA Cosmos</text>

  <rect x="490" y="280" width="210" height="50" rx="6" fill="#f9ab00" opacity="0.15" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="595" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e37400" font-weight="bold">Sample-Efficient</text>
  <text x="595" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e37400" font-weight="bold">Agent Training</text>

  <line x1="515" y1="180" x2="515" y2="200" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="670" y1="180" x2="670" y2="200" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="595" y1="250" x2="595" y2="280" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bridge -->
  <rect x="250" y="355" width="300" height="45" rx="8" fill="#34a853" opacity="0.15" stroke="#34a853" stroke-width="2"/>
  <text x="400" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1e7e34" font-weight="bold">Quant Trading: Both Approaches Converge</text>
</svg>