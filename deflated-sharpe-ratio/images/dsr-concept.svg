<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <rect width="800" height="300" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">Deflated Sharpe Ratio: Correcting for Multiple Testing</text>
  <rect x="40" y="60" width="200" height="80" rx="8" fill="#ea4335" opacity="0.1" stroke="#ea4335" stroke-width="2"/>
  <text x="140" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ea4335" font-weight="bold">N strategies tested</text>
  <text x="140" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Each has a Sharpe ratio</text>
  <text x="140" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Best SR* is selected</text>
  <rect x="300" y="60" width="200" height="80" rx="8" fill="#fbbc04" opacity="0.12" stroke="#fbbc04" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#b8860b" font-weight="bold">Selection Bias</text>
  <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">E[max(SR)] > E[SR]</text>
  <text x="400" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">More trials = more inflation</text>
  <rect x="560" y="60" width="200" height="80" rx="8" fill="#34a853" opacity="0.1" stroke="#34a853" stroke-width="2"/>
  <text x="660" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#34a853" font-weight="bold">DSR Correction</text>
  <text x="660" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Adjusts for N trials,</text>
  <text x="660" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">skewness, kurtosis</text>
  <rect x="100" y="180" width="600" height="50" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333">DSR = P[ SR* > 0 | N trials, skew, kurtosis ] — probability the best SR is genuinely positive</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335">Testing 100 strategies and picking the best is NOT the same as finding one good strategy</text>
</svg>