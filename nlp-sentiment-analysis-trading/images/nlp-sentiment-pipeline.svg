<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <rect width="800" height="350" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" fill="#1a1a1a" font-weight="bold">NLP Sentiment Pipeline for Trading</text>

  <!-- Data sources -->
  <rect x="30" y="60" width="130" height="130" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="95" y="85" text-anchor="middle" font-family="Arial" font-size="13" fill="#1a73e8" font-weight="bold">Data Sources</text>
  <text x="95" y="108" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">News articles</text>
  <text x="95" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Earnings calls</text>
  <text x="95" y="142" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">SEC filings</text>
  <text x="95" y="159" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Social media</text>
  <text x="95" y="176" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Analyst reports</text>

  <line x1="160" y1="125" x2="195" y2="125" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- NLP Model -->
  <rect x="205" y="60" width="160" height="130" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="285" y="85" text-anchor="middle" font-family="Arial" font-size="13" fill="#ea4335" font-weight="bold">NLP Model</text>
  <text x="285" y="110" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">FinBERT</text>
  <text x="285" y="128" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">GPT-4o / Claude</text>
  <text x="285" y="146" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">FinGPT</text>
  <text x="285" y="172" text-anchor="middle" font-family="Arial" font-size="10" fill="#ea4335">→ Sentiment score</text>

  <line x1="365" y1="125" x2="400" y2="125" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Signal -->
  <rect x="410" y="60" width="150" height="130" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="485" y="85" text-anchor="middle" font-family="Arial" font-size="13" fill="#34a853" font-weight="bold">Signal Builder</text>
  <text x="485" y="110" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Aggregate scores</text>
  <text x="485" y="128" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Time-weight decay</text>
  <text x="485" y="146" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Z-score normalise</text>
  <text x="485" y="172" text-anchor="middle" font-family="Arial" font-size="10" fill="#34a853">→ Trading signal</text>

  <line x1="560" y1="125" x2="595" y2="125" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Strategy -->
  <rect x="605" y="60" width="160" height="130" rx="8" fill="#f3e8fd" stroke="#7b1fa2" stroke-width="2"/>
  <text x="685" y="85" text-anchor="middle" font-family="Arial" font-size="13" fill="#7b1fa2" font-weight="bold">Trading Strategy</text>
  <text x="685" y="110" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Long positive</text>
  <text x="685" y="128" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Short negative</text>
  <text x="685" y="146" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Risk management</text>
  <text x="685" y="172" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b1fa2">→ Orders</text>

  <!-- Evolution timeline -->
  <text x="400" y="230" text-anchor="middle" font-family="Arial" font-size="15" fill="#1a1a1a" font-weight="bold">Evolution of Financial NLP</text>

  <rect x="50" y="250" width="130" height="60" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="115" y="272" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Bag-of-Words</text>
  <text x="115" y="292" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">2005–2015</text>
  <line x1="180" y1="280" x2="215" y2="280" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="225" y="250" width="130" height="60" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="290" y="272" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Word2Vec</text>
  <text x="290" y="292" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">2015–2019</text>
  <line x1="355" y1="280" x2="390" y2="280" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="400" y="250" width="130" height="60" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="465" y="272" text-anchor="middle" font-family="Arial" font-size="12" fill="#1a73e8" font-weight="bold">FinBERT</text>
  <text x="465" y="292" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">2019–2023</text>
  <line x1="530" y1="280" x2="565" y2="280" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="575" y="250" width="170" height="60" rx="6" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="660" y="272" text-anchor="middle" font-family="Arial" font-size="12" fill="#ea4335" font-weight="bold">LLM Agents</text>
  <text x="660" y="292" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">2023–present</text>
</svg>