<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <rect width="800" height="350" fill="white"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/></marker></defs>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#333" font-weight="bold">Kalman Filter: Predict-Update Cycle</text>
  <rect x="80" y="70" width="250" height="110" rx="12" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="205" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">PREDICT</text>
  <text x="205" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">x̂ₜ|ₜ₋₁ = F · x̂ₜ₋₁</text>
  <text x="205" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Pₜ|ₜ₋₁ = F · Pₜ₋₁ · Fᵀ + Q</text>
  <text x="205" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Prior estimate from dynamics</text>
  <rect x="470" y="70" width="250" height="110" rx="12" fill="#e8f5e9" stroke="#34a853" stroke-width="2"/>
  <text x="595" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e7e34" font-weight="bold">UPDATE</text>
  <text x="595" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">K = Pₜ|ₜ₋₁ · Hᵀ · (H·P·Hᵀ+R)⁻¹</text>
  <text x="595" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">x̂ₜ = x̂ₜ|ₜ₋₁ + K · (yₜ - H · x̂ₜ|ₜ₋₁)</text>
  <text x="595" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Correct with new observation</text>
  <line x1="330" y1="125" x2="470" y2="125" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 595 180 Q 595 250 400 250 Q 205 250 205 180" fill="none" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Repeat each timestep</text>
  <rect x="150" y="280" width="500" height="50" rx="8" fill="#1a73e8" opacity="0.08" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="400" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-weight="bold">Trading Applications</text>
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Pairs Trading Spread · Dynamic Hedge Ratio · Signal Extraction · Trend Filtering</text>
</svg>