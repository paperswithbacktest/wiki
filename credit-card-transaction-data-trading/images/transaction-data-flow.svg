<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>
  
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#202124" font-weight="bold">Transaction Data Flow: From Consumers to Trading Signals</text>
  
  <!-- Layer 1: Data Sources -->
  <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5f6368" font-weight="bold">DATA SOURCES</text>
  
  <rect x="20" y="85" width="75" height="55" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="57" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8" font-weight="bold">Credit</text>
  <text x="57" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8" font-weight="bold">Cards</text>
  
  <rect x="105" y="85" width="75" height="55" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="142" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8" font-weight="bold">Debit</text>
  <text x="142" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8" font-weight="bold">Cards</text>
  
  <rect x="190" y="85" width="75" height="55" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="227" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8" font-weight="bold">POS</text>
  <text x="227" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a73e8" font-weight="bold">Systems</text>
  
  <!-- Arrow down to aggregation -->
  <line x1="142" y1="140" x2="142" y2="170" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Layer 2: Vendor Aggregation -->
  <text x="400" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5f6368" font-weight="bold">VENDOR PROCESSING</text>
  
  <rect x="290" y="85" width="220" height="100" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34a853" font-weight="bold">Data Vendor</text>
  <text x="400" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">• Anonymize &amp; aggregate</text>
  <text x="400" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">• Map to company tickers</text>
  <text x="400" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">• Normalize for panel changes</text>
  
  <!-- Arrow from sources to vendor -->
  <line x1="265" y1="112" x2="288" y2="112" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Arrow from vendor to signals -->
  <line x1="510" y1="135" x2="560" y2="135" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Layer 3: Trading Signals -->
  <text x="680" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5f6368" font-weight="bold">TRADING SIGNALS</text>
  
  <rect x="570" y="85" width="200" height="100" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335" font-weight="bold">Alpha Model</text>
  <text x="670" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">• Revenue nowcast</text>
  <text x="670" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">• Earnings surprise</text>
  <text x="670" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">• Long/short signal</text>
  
  <!-- Bottom: use case boxes -->
  <text x="400" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#202124" font-weight="bold">Key Use Cases</text>
  
  <rect x="50" y="250" width="200" height="65" rx="6" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5"/>
  <text x="150" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#202124" font-weight="bold">Revenue Nowcasting</text>
  <text x="150" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Real-time sales estimation</text>
  
  <rect x="300" y="250" width="200" height="65" rx="6" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#202124" font-weight="bold">Earnings Surprise</text>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Pre-announcement positioning</text>
  
  <rect x="550" y="250" width="200" height="65" rx="6" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5"/>
  <text x="650" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#202124" font-weight="bold">Consumer Trends</text>
  <text x="650" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Sector &amp; thematic signals</text>
  
  <!-- Warning box -->
  <rect x="150" y="340" width="500" height="40" rx="6" fill="#fef7e0" stroke="#a87000" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a87000" font-weight="bold">⚠ Key Risk: Panel bias — always use YoY changes, not absolute levels</text>
</svg>