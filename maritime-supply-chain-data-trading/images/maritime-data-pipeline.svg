<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>
  
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#202124" font-weight="bold">Maritime Data Pipeline: From AIS to Trading Signals</text>
  
  <!-- Layer 1: AIS Sources -->
  <rect x="30" y="60" width="160" height="90" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-weight="bold">AIS Transponders</text>
  <text x="110" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Position, speed, heading</text>
  <text x="110" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">~100K vessels globally</text>
  <text x="110" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Every few seconds</text>
  
  <line x1="190" y1="105" x2="230" y2="105" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Layer 2: Processing -->
  <rect x="240" y="60" width="160" height="90" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="320" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#34a853" font-weight="bold">Data Processing</text>
  <text x="320" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Vessel identification</text>
  <text x="320" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Cargo estimation</text>
  <text x="320" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Port event detection</text>
  
  <line x1="400" y1="105" x2="440" y2="105" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Layer 3: Analytics -->
  <rect x="450" y="60" width="160" height="90" rx="8" fill="#fef7e0" stroke="#a87000" stroke-width="2"/>
  <text x="530" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#a87000" font-weight="bold">Analytics Engine</text>
  <text x="530" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Trade flow aggregation</text>
  <text x="530" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Congestion metrics</text>
  <text x="530" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Anomaly detection</text>
  
  <line x1="610" y1="105" x2="640" y2="105" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Layer 4: Signal -->
  <rect x="650" y="60" width="130" height="90" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="715" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ea4335" font-weight="bold">Trading Signal</text>
  <text x="715" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Commodity long/short</text>
  <text x="715" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Macro positioning</text>
  <text x="715" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">2-6 week lead</text>
  
  <!-- Use cases -->
  <text x="400" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#202124" font-weight="bold">Core Commodity Signals</text>
  
  <rect x="30" y="215" width="170" height="80" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="115" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-weight="bold">Crude Oil</text>
  <text x="115" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">VLCC loadings, floating</text>
  <text x="115" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">storage, route analysis</text>
  
  <rect x="220" y="215" width="170" height="80" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="305" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34a853" font-weight="bold">Dry Bulk</text>
  <text x="305" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Iron ore, coal, grain</text>
  <text x="305" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">flows and BDI signals</text>
  
  <rect x="410" y="215" width="170" height="80" rx="8" fill="#fef7e0" stroke="#a87000" stroke-width="1.5"/>
  <text x="495" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a87000" font-weight="bold">LNG / Energy</text>
  <text x="495" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">LNG tanker rerouting</text>
  <text x="495" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Asia vs. Europe flows</text>
  
  <rect x="600" y="215" width="170" height="80" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="685" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ea4335" font-weight="bold">Container</text>
  <text x="685" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Port congestion, retail</text>
  <text x="685" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">inventory forecasting</text>
  
  <!-- Bottom note -->
  <rect x="150" y="330" width="500" height="60" rx="8" fill="#f8f9fa" stroke="#dadce0" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-weight="bold">Key Insight</text>
  <text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Vessels = physical embodiment of global supply and demand</text>
</svg>