<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a73e8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#202124" font-weight="bold">LLM-Driven Evolutionary Optimization Loop</text>

  <!-- POPULATION / ARCHIVE box -->
  <rect x="40" y="150" width="180" height="130" rx="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="130" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">ARCHIVE</text>
  <text x="130" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Population of</text>
  <text x="130" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">strategy programs</text>
  <text x="130" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">MAP-Elites niches</text>
  <text x="130" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">(diversity preserved)</text>

  <!-- Arrow: Archive -> LLM (sample parents) -->
  <line x1="220" y1="120" x2="290" y2="120" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="255" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">sample parents</text>
  <path d="M 130 150 L 130 120 L 285 120" fill="none" stroke="#5f6368" stroke-width="2"/>

  <!-- LLM MUTATION box -->
  <rect x="290" y="75" width="220" height="90" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="400" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ea4335" font-weight="bold">LLM MUTATION</text>
  <text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Rewrite code: add filters,</text>
  <text x="400" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">swap signals, merge parents</text>

  <!-- Arrow: LLM -> Evaluate -->
  <line x1="510" y1="120" x2="580" y2="120" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="545" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">children</text>

  <!-- EVALUATE box -->
  <rect x="580" y="150" width="180" height="130" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="670" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34a853" font-weight="bold">EVALUATE</text>
  <text x="670" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Walk-forward backtest</text>
  <text x="670" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Fitness = Sharpe</text>
  <text x="670" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">&#8722; turnover &#8722; maxDD</text>
  <text x="670" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">penalties</text>
  <path d="M 580 120 L 670 120 L 670 150" fill="none" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Evaluate -> Archive (select) -->
  <path d="M 580 250 L 400 340 L 220 250" fill="none" stroke="#1a73e8" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a73e8" font-style="italic">Selection: insert survivors, evict dominated programs &#8594; next generation</text>

  <!-- Generation note -->
  <text x="400" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Repeat for tens of generations until fitness plateaus or compute budget is spent</text>
</svg>
