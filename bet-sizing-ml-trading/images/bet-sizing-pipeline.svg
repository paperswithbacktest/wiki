<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <rect width="800" height="300" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">From ML Probability to Position Size</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/></marker></defs>
  <rect x="40" y="70" width="160" height="70" rx="8" fill="#1a73e8" opacity="0.12" stroke="#1a73e8" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-weight="bold">ML Model</text>
  <text x="120" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">p(success) = 0.72</text>
  <line x1="200" y1="105" x2="260" y2="105" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="55" width="180" height="100" rx="8" fill="#34a853" opacity="0.1" stroke="#34a853" stroke-width="2"/>
  <text x="360" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#34a853" font-weight="bold">Sizing Function</text>
  <text x="360" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">Linear / Sigmoid /</text>
  <text x="360" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">Kelly / Budgeting</text>
  <text x="360" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5f6368">Maps [0.5, 1] → [0, max]</text>
  <line x1="450" y1="105" x2="510" y2="105" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="520" y="70" width="160" height="70" rx="8" fill="#fbbc04" opacity="0.12" stroke="#fbbc04" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#b8860b" font-weight="bold">Position Size</text>
  <text x="600" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">size = 0.44 × max</text>
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#333">Final position = Side (from primary model) × Size (from meta-model probability)</text>
  <text x="400" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Higher confidence → larger bet. Below threshold → skip entirely.</text>
</svg>