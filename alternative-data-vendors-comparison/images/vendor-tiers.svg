  <rect x="250" y="50" width="300" height="55" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="400" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a73e8" font-weight="bold">Tier 1: Raw Data Collectors</text>
  <text x="400" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Planet Labs, Mastercard, Mobile SDKs</text>
  <rect x="200" y="130" width="400" height="55" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
