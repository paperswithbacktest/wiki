<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <rect width="800" height="320" fill="white"/>
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">Sample Weight Components in Financial ML</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/></marker></defs>
  <rect x="40" y="70" width="180" height="70" rx="8" fill="#1a73e8" opacity="0.12" stroke="#1a73e8" stroke-width="2"/>
  <text x="130" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a73e8" font-weight="bold">Uniqueness</text>
  <text x="130" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">avg uniqueness of label</text>
  <rect x="310" y="70" width="180" height="70" rx="8" fill="#34a853" opacity="0.12" stroke="#34a853" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#34a853" font-weight="bold">Returns Attribution</text>
  <text x="400" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">absolute return of event</text>
  <rect x="580" y="70" width="180" height="70" rx="8" fill="#fbbc04" opacity="0.12" stroke="#fbbc04" stroke-width="2"/>
  <text x="670" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#b8860b" font-weight="bold">Time Decay</text>
  <text x="670" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">recent samples matter more</text>
  <line x1="130" y1="140" x2="130" y2="180" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="140" x2="400" y2="180" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="140" x2="670" y2="180" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="200" y="190" width="400" height="60" rx="10" fill="#9c27b0" opacity="0.1" stroke="#9c27b0" stroke-width="2"/>
  <text x="400" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9c27b0" font-weight="bold">Final Weight = Uniqueness × Return × Decay</text>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5f6368">Passed to sample_weight parameter in sklearn estimators</text>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Ensures the ML model focuses on informative, recent, and unique observations</text>
</svg>