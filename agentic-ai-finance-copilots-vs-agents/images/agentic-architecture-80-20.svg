<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="white"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5f6368"/>
    </marker>
  </defs>
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" fill="#1a1a1a" font-weight="bold">Agentic System Architecture: The 80/20 Rule</text>
  <text x="400" y="52" text-anchor="middle" font-family="Arial" font-size="13" fill="#5f6368">≤ 20% LLM subagents · ≥ 80% deterministic components</text>

  <!-- Orchestrator -->
  <rect x="280" y="75" width="240" height="50" rx="8" fill="#f3e8fd" stroke="#7b1fa2" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="14" fill="#7b1fa2" font-weight="bold">Orchestrator (Deterministic)</text>

  <!-- Arrows down -->
  <line x1="200" y1="125" x2="200" y2="155" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="125" x2="400" y2="155" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="125" x2="600" y2="155" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Connections from orchestrator -->
  <line x1="330" y1="100" x2="200" y2="125" stroke="#5f6368" stroke-width="1.5"/>
  <line x1="470" y1="100" x2="600" y2="125" stroke="#5f6368" stroke-width="1.5"/>

  <!-- Deterministic subagents (80%) -->
  <rect x="80" y="160" width="240" height="90" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="200" y="185" text-anchor="middle" font-family="Arial" font-size="13" fill="#34a853" font-weight="bold">Deterministic Subagents (80%)</text>
  <text x="200" y="207" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Strategy signals, risk checks,</text>
  <text x="200" y="223" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">portfolio math, order routing</text>
  <text x="200" y="243" text-anchor="middle" font-family="Arial" font-size="11" fill="#34a853">Fast · Auditable · Predictable</text>

  <!-- LLM subagents (20%) -->
  <rect x="480" y="160" width="240" height="90" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="600" y="185" text-anchor="middle" font-family="Arial" font-size="13" fill="#ea4335" font-weight="bold">LLM Subagents (≤20%)</text>
  <text x="600" y="207" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">News reasoning, transcript analysis,</text>
  <text x="600" y="223" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">narrative interpretation, debate</text>
  <text x="600" y="243" text-anchor="middle" font-family="Arial" font-size="11" fill="#ea4335">Flexible · Stochastic · Slow</text>

  <!-- Data layer -->
  <rect x="280" y="160" width="140" height="90" rx="8" fill="#fef7e0" stroke="#fbbc04" stroke-width="2"/>
  <text x="350" y="185" text-anchor="middle" font-family="Arial" font-size="13" fill="#f9a825" font-weight="bold">Data Layer</text>
  <text x="350" y="207" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">Market feeds</text>
  <text x="350" y="223" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">News APIs</text>
  <text x="350" y="243" text-anchor="middle" font-family="Arial" font-size="11" fill="#5f6368">SEC filings</text>

  <!-- Risk management layer -->
  <rect x="180" y="290" width="440" height="50" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="400" y="320" text-anchor="middle" font-family="Arial" font-size="14" fill="#1a73e8" font-weight="bold">Risk Management + Execution (Deterministic — never LLM)</text>

  <!-- Arrows to risk -->
  <line x1="200" y1="250" x2="300" y2="285" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="250" x2="400" y2="285" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="250" x2="500" y2="285" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Broker -->
  <rect x="300" y="360" width="200" height="35" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="400" y="383" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Broker / Exchange</text>
  <line x1="400" y1="340" x2="400" y2="357" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>